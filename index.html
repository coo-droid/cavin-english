<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CAVIN English">
<meta name="theme-color" content="#0a0a0a">
<title>CAVIN English</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230a0a0a'/%3E%3Ctext x='90' y='115' font-size='90' text-anchor='middle' fill='%23d4af37'%3E🌸%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">
  <header>
    <div class="logo">CAVIN</div>
    <div class="brand">English Companion</div>
    <div class="subtitle" id="dateLabel"></div>
  </header>

  <div class="top-stats">
    <div class="stat-card stat-countdown">
      <div class="stat-num" id="countdownNum">—</div>
      <div class="stat-label">DAYS TO JAKARTA</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="streakNum">0</div>
      <div class="stat-label">STREAK</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="todayCount">0/11</div>
      <div class="stat-label">TODAY</div>
    </div>
  </div>

  <div class="story-banner" id="storyBanner" style="display:none;">
    <div class="story-text">
      <div class="story-title">📖 Review time</div>
      <div class="story-sub" id="storyCount">— items waiting</div>
    </div>
    <button class="story-btn" onclick="App.openModule('story-mode')">START</button>
  </div>

  <div class="now-card">
    <div class="now-time" id="nowTime">— : —</div>
    <div class="now-title" id="nowTitle">Loading...</div>
    <div class="now-desc" id="nowDesc"></div>
    <button class="start-btn" id="nowBtn">START</button>
  </div>

  <div class="section-title">TODAY'S SCHEDULE</div>
  <div class="schedule-list" id="scheduleList"></div>

  <div class="section-title">PRACTICE</div>
  <div class="menu-grid">
    <button class="menu-item" onclick="App.openModule('shadowing-hub')">
      <div class="menu-icon">🎬</div>
      <div class="menu-name">Shadowing</div>
      <div class="menu-desc">50× / 20× drill</div>
    </button>
    <button class="menu-item" onclick="App.openModule('vocab-list')">
      <div class="menu-icon">📚</div>
      <div class="menu-name">Vocabulary</div>
      <div class="menu-desc">Forgetting curve</div>
    </button>
    <button class="menu-item" onclick="App.openModule('scenes')">
      <div class="menu-icon">🎭</div>
      <div class="menu-name">Scene Phrases</div>
      <div class="menu-desc">Meeting / Meal / Talk</div>
    </button>
    <button class="menu-item" onclick="App.openModule('voice-roleplay')">
      <div class="menu-icon">🗣️</div>
      <div class="menu-name">Voice Roleplay</div>
      <div class="menu-desc">In-app AI talk</div>
    </button>
    <button class="menu-item" onclick="App.openModule('dashboard')">
      <div class="menu-icon">📊</div>
      <div class="menu-name">Dashboard</div>
      <div class="menu-desc">Progress visual</div>
    </button>
    <button class="menu-item" onclick="App.openModule('flash-random')">
      <div class="menu-icon">🃏</div>
      <div class="menu-name">Random Flash</div>
      <div class="menu-desc">28-card drill</div>
    </button>
  </div>

  <div class="section-title">QUICK ACCESS</div>
  <div class="menu-grid">
    <button class="menu-item" onclick="App.openModule('declaration')">
      <div class="menu-icon">🪞</div>
      <div class="menu-name">Declaration</div>
      <div class="menu-desc">Identity reset</div>
    </button>
    <button class="menu-item" onclick="App.openModule('hook')">
      <div class="menu-icon">🌸</div>
      <div class="menu-name">Self Intro Hook</div>
      <div class="menu-desc">Practice anytime</div>
    </button>
    <button class="menu-item" onclick="App.openModule('phrase-today')">
      <div class="menu-icon">📝</div>
      <div class="menu-name">Today's Phrase</div>
      <div class="menu-desc">Daily one-liner</div>
    </button>
    <button class="menu-item" onclick="App.openModule('listen')">
      <div class="menu-icon">🎧</div>
      <div class="menu-name">Listen</div>
      <div class="menu-desc">Podcast launcher</div>
    </button>
    <button class="menu-item" onclick="App.openModule('roleplay')">
      <div class="menu-icon">💼</div>
      <div class="menu-name">ChatGPT Roleplay</div>
      <div class="menu-desc">Weekend deep talk</div>
    </button>
    <button class="menu-item" onclick="App.openModule('diary')">
      <div class="menu-icon">📔</div>
      <div class="menu-name">Diary</div>
      <div class="menu-desc">3-line reflection</div>
    </button>
    <button class="menu-item" onclick="App.openModule('emergency')">
      <div class="menu-icon">🚨</div>
      <div class="menu-name">2-Min Mode</div>
      <div class="menu-desc">When too busy</div>
    </button>
    <button class="menu-item" onclick="App.openModule('history')">
      <div class="menu-icon">📓</div>
      <div class="menu-name">History</div>
      <div class="menu-desc">Past diaries</div>
    </button>
  </div>

  <div class="footer-hint">
    Add to Home Screen for app experience<br>
    Safari → Share → Add to Home Screen
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="App.closeModal()">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="data.js?v=2"></script>
<script src="storage.js?v=2"></script>
<script src="speech.js?v=2"></script>
<script src="vocab.js?v=2"></script>
<script src="shadowing.js?v=2"></script>
<script src="modules.js?v=2"></script>
<script src="app.js?v=2"></script>
</body>
</html>
