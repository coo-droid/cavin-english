<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CAVIN English">
<meta name="theme-color" content="#fff8ee">
<title>CAVIN English</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23fff8ee'/%3E%3Ctext x='90' y='130' font-size='110' text-anchor='middle'%3E🌸%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css?v=12">
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">
  <header>
    <div class="logo">CAVIN</div>
    <div class="brand">English</div>
    <div class="subtitle" id="dateLabel"></div>
  </header>

  <div class="hero-card pop-in" id="heroCard">
    <div class="hero-greeting" id="heroGreeting">GOOD MORNING</div>
    <div class="hero-message" id="heroMessage">Loading your day...</div>
    <div class="hero-stats">
      <div class="hero-stat" id="heroStreak">🔥 0</div>
      <div class="hero-stat" id="heroXp">⭐ 0 XP</div>
      <div class="hero-stat" id="heroLevel">LV 1</div>
    </div>
  </div>

  <div class="top-stats">
    <div class="stat-card stat-countdown">
      <div class="stat-num" id="countdownNum">—</div>
      <div class="stat-label">DAYS TO JAKARTA</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="streakNum">0</div>
      <div class="stat-label">STREAK</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="todayCount">0/13</div>
      <div class="stat-label">TODAY</div>
    </div>
  </div>

  <div style="background: var(--card); border: 2px solid var(--line); border-bottom-width: 3px; border-radius: 14px; padding: 12px 14px; margin-bottom: 14px;">
    <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; margin-bottom: 6px;">
      <span style="color: var(--purple-dark);" id="lvLabel">LEVEL 1</span>
      <span style="color: var(--text-soft);" id="lvDetail">0 / 100 XP</span>
    </div>
    <div class="progress-bar" style="margin-bottom: 0; height: 10px;"><div class="progress-fill" id="lvProgress" style="width:0%"></div></div>
  </div>

  <div id="micWarning" style="display:none;"></div>

  <button class="daily-flow-cta" onclick="App.openModule('coach-plan')">
    <div class="dfc-icon">🌟</div>
    <div class="dfc-text">
      <div class="dfc-title">Today's Coach Plan</div>
      <div class="dfc-sub">AIがあなた専用に毎日カスタム提案</div>
    </div>
    <div class="dfc-arrow">▶</div>
  </button>

  <div class="story-banner" id="storyBanner" style="display:none;">
    <div class="story-text">
      <div class="story-title">📖 Review time</div>
      <div class="story-sub" id="storyCount">— items waiting</div>
    </div>
    <button class="story-btn" onclick="App.openModule('story-mode')">START</button>
  </div>

  <!-- 中核機能のみホームに -->
  <div class="section-title">CORE PRACTICE</div>
  <div class="menu-grid">
    <button class="menu-item tile-pink" onclick="App.openModule('realtime')">
      <div class="menu-icon">⚡</div>
      <div class="menu-name">Realtime Voice</div>
      <div class="menu-desc">Phone-like AI talk</div>
    </button>
    <button class="menu-item tile-purple" onclick="App.openModule('live-talk')">
      <div class="menu-icon">🎙️</div>
      <div class="menu-name">Live Talk</div>
      <div class="menu-desc">Hold-to-talk</div>
    </button>
    <button class="menu-item tile-blue" onclick="App.openModule('composition')">
      <div class="menu-icon">✍️</div>
      <div class="menu-name">Composition</div>
      <div class="menu-desc">Write & improve</div>
    </button>
    <button class="menu-item tile-yellow" onclick="App.openModule('weakness-drill')">
      <div class="menu-icon">🎯</div>
      <div class="menu-name">Weakness Drill</div>
      <div class="menu-desc">Your weak spots</div>
    </button>
    <button class="menu-item tile-green" onclick="App.openModule('shadowing-hub')">
      <div class="menu-icon">🎬</div>
      <div class="menu-name">Shadowing</div>
      <div class="menu-desc">Mouth memory</div>
    </button>
    <button class="menu-item tile-orange" onclick="App.openModule('vocab-list')">
      <div class="menu-icon">📚</div>
      <div class="menu-name">Vocabulary</div>
      <div class="menu-desc">Forgetting curve</div>
    </button>
  </div>

  <button class="more-btn" onclick="App.openModule('more-menu')">
    <span>⋯ MORE TOOLS</span>
    <span style="font-size: 11px; opacity: 0.7; font-weight: 700;">All other features</span>
  </button>

  <div class="footer-hint">
    Add to Home Screen for app experience<br>
    Safari → Share → Add to Home Screen
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="modal-close" onclick="App.closeModal()">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="data.js?v=12"></script>
<script src="storage.js?v=12"></script>
<script src="speech.js?v=12"></script>
<script src="vocab.js?v=12"></script>
<script src="shadowing.js?v=12"></script>
<script src="modules.js?v=12"></script>
<script src="app.js?v=12"></script>
</body>
</html>
